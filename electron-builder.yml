appId: com.siwash.axure-to-markdown
productName: Axure to Markdown
copyright: Copyright © 2026 Siwash

extraMetadata:
  main: app/main.js

directories:
  output: release

files:
  - "app/**/*"
  - "src/**/*"
  - "index.js"
  - "bin/**/*"
  - "package.json"
  - "node_modules/**/*"

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: build/icon.png
  category: public.app-category.developer-tools

win:
  target: nsis
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

publish:
  provider: github
  owner: Siwash
  repo: axure-to-markdown
